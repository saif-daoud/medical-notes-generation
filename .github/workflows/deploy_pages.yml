name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Worker dependencies
        run: npm --prefix worker ci

      - name: Prepare Cloudflare Worker
        id: worker
        continue-on-error: true
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ACCESS_CODE_HASH: ${{ secrets.ACCESS_CODE_HASH }}
        run: |
          set -euo pipefail

          if [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ] || [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "Cloudflare secrets are required for aggregate all-expert stats." >&2
            exit 1
          fi

          DB_NAME="sakina_expert_feedback"
          DB_LIST_JSON="$(cd worker && npx wrangler d1 list --json)"
          DB_ID="$(DB_LIST_JSON="$DB_LIST_JSON" DB_NAME="$DB_NAME" node - <<'NODE'
          const payload = JSON.parse(process.env.DB_LIST_JSON || "[]");
          const rows = Array.isArray(payload) ? payload : payload.result || payload.databases || [];
          const match = rows.find((row) => row.name === process.env.DB_NAME);
          process.stdout.write(match?.uuid || match?.id || match?.database_id || "");
          NODE
          )"

          if [ -z "$DB_ID" ]; then
            CREATE_JSON="$(cd worker && npx wrangler d1 create "$DB_NAME" --json)"
            DB_ID="$(CREATE_JSON="$CREATE_JSON" node - <<'NODE'
          const payload = JSON.parse(process.env.CREATE_JSON || "{}");
          const row = Array.isArray(payload) ? payload[0] : payload.result || payload;
          process.stdout.write(row?.uuid || row?.id || row?.database_id || "");
          NODE
            )"
          fi

          if [ -z "$DB_ID" ]; then
            echo "Could not determine Cloudflare D1 database id." >&2
            exit 1
          fi

          DB_ID="$DB_ID" ACCESS_CODE_HASH="${ACCESS_CODE_HASH:-}" node - <<'NODE'
          const fs = require("fs");
          const file = "worker/wrangler.toml";
          let toml = fs.readFileSync(file, "utf8");
          toml = toml.replace(/database_id = ".*"/, `database_id = "${process.env.DB_ID}"`);
          if (process.env.ACCESS_CODE_HASH) {
            toml = toml.replace(/ACCESS_CODE_HASHES = ".*"/, `ACCESS_CODE_HASHES = "${process.env.ACCESS_CODE_HASH}"`);
          }
          fs.writeFileSync(file, toml);
          NODE

          cd worker
          npx wrangler d1 migrations apply "$DB_NAME" --remote
          npx wrangler deploy 2>&1 | tee ../worker-deploy.log
          cd ..

          SUBDOMAIN_JSON="$(curl -fsS \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/subdomain" || true)"
          WORKERS_SUBDOMAIN="$(SUBDOMAIN_JSON="$SUBDOMAIN_JSON" node - <<'NODE'
          const payload = JSON.parse(process.env.SUBDOMAIN_JSON || "{}");
          process.stdout.write(payload?.result?.subdomain || "");
          NODE
          )"

          if [ -n "$WORKERS_SUBDOMAIN" ]; then
            WORKER_URL="https://sakina-expert-feedback-api.${WORKERS_SUBDOMAIN}.workers.dev"
          else
            WORKER_URL="$(node - <<'NODE'
          const fs = require("fs");
          const log = fs.readFileSync("worker-deploy.log", "utf8");
          const match = log.match(/https:\/\/[^\s]+\.workers\.dev/);
          if (!match) process.exit(1);
          process.stdout.write(match[0].replace(/[),.]+$/, ""));
          NODE
            )"
          fi

          echo "worker_url=$WORKER_URL" >> "$GITHUB_OUTPUT"

      - name: Resolve API base
        id: api
        env:
          VITE_API_BASE_SECRET: ${{ secrets.VITE_API_BASE }}
          DETECTED_WORKER_URL: ${{ steps.worker.outputs.worker_url }}
        run: |
          if [ -n "${VITE_API_BASE_SECRET:-}" ]; then
            echo "url=${VITE_API_BASE_SECRET}" >> "$GITHUB_OUTPUT"
          else
            echo "url=${DETECTED_WORKER_URL:-}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        env:
          VITE_BASE_PATH: /medical-notes-generation/
          VITE_ACCESS_CODE_HASH: ${{ secrets.ACCESS_CODE_HASH }}
          VITE_API_BASE: ${{ steps.api.outputs.url }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
